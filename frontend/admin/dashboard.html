<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="/admin/css/dashboard.css" />
  </head>

  <body>
    <!-- ===== SIDEBAR ===== -->
    <aside class="sidebar">
      <h2>Admin Panel</h2>
      <nav>
        <a class="active" href="#">Dashboard</a>
        <a href="#">Users</a>
        <a href="#">Companies</a>
        <a href="#">Jobs</a>
        <a href="#">Reports</a>
        <a href="#">Settings</a>
      </nav>
      <button id="logout-btn">Logout</button>
    </aside>

    <!-- ===== HEADER ===== -->
    <header class="header">
      <h3>Welcome, Admin</h3>
      <input
        type="text"
        name="searchbar"
        id="searchbar"
        placeholder="Search..."
      />
    </header>

    <!-- ===== MAIN CONTENT ===== -->
    <div class="main-content">
      <h1>Admin Dashboard</h1>

      <div class="stats">
        <p>Total Users : <span id="total-users">Loading...</span></p>
        <p>Total Companies : <span id="total-companies">Loading...</span></p>
      </div>

      <section class="table-section">
        <h3>Recent Users</h3>
        <table>
          <thead>
            <tr>
              <th>Name</th>
              <th>Email</th>
              <th>Role</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </section>
    </div>

    <script src="js/dashboard.js"></script>
  </body>
</html>
